<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <radialGradient id="hubGlowLight" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#65a30d" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#65a30d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="320" rx="56" fill="#ffffff"/>

  <!-- Faint backdrop grid dots -->
  <g fill="#cbd5e1" opacity="0.7">
    <circle cx="40" cy="40" r="1"/><circle cx="80" cy="40" r="1"/><circle cx="120" cy="40" r="1"/><circle cx="160" cy="40" r="1"/><circle cx="200" cy="40" r="1"/><circle cx="240" cy="40" r="1"/><circle cx="280" cy="40" r="1"/>
    <circle cx="40" cy="280" r="1"/><circle cx="80" cy="280" r="1"/><circle cx="120" cy="280" r="1"/><circle cx="160" cy="280" r="1"/><circle cx="200" cy="280" r="1"/><circle cx="240" cy="280" r="1"/><circle cx="280" cy="280" r="1"/>
  </g>

  <!-- M-shape node layout: 5 primary vertices forming M -->
  <!-- vertices: A(left-bottom) 70,240  B(left-top) 70,90  C(center-mid) 160,200  D(right-top) 250,90  E(right-bottom) 250,240 -->

  <!-- Connecting lines -->
  <g stroke="#334155" stroke-width="1.6" fill="none">
    <line x1="70" y1="240" x2="70" y2="90"/>
    <line x1="70" y1="90" x2="160" y2="200"/>
    <line x1="160" y1="200" x2="250" y2="90"/>
    <line x1="250" y1="90" x2="250" y2="240"/>
    <!-- subtle decentralized cross-links -->
    <line x1="70" y1="165" x2="160" y2="200" stroke-dasharray="2 4" opacity="0.55"/>
    <line x1="250" y1="165" x2="160" y2="200" stroke-dasharray="2 4" opacity="0.55"/>
    <line x1="115" y1="135" x2="205" y2="135" stroke-dasharray="2 4" opacity="0.4"/>
  </g>

  <!-- Hub glow at center -->
  <circle cx="160" cy="200" r="36" fill="url(#hubGlowLight)"/>

  <!-- Primary nodes (deeper lime for contrast on white) -->
  <g fill="#4d7c0f">
    <circle cx="70" cy="90" r="6"/>
    <circle cx="250" cy="90" r="6"/>
    <circle cx="70" cy="240" r="6"/>
    <circle cx="250" cy="240" r="6"/>
    <circle cx="160" cy="200" r="9"/>
  </g>
  <!-- Inner ring on hub -->
  <circle cx="160" cy="200" r="9" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="160" cy="200" r="14" fill="none" stroke="#4d7c0f" stroke-width="1.3" opacity="0.75"/>

  <!-- Secondary node dots along edges -->
  <g fill="#64748b">
    <circle cx="70" cy="135" r="2.5"/>
    <circle cx="70" cy="180" r="2.5"/>
    <circle cx="115" cy="135" r="2.5"/>
    <circle cx="205" cy="135" r="2.5"/>
    <circle cx="250" cy="135" r="2.5"/>
    <circle cx="250" cy="180" r="2.5"/>
  </g>

  <text x="160" y="300" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="20" font-weight="600" fill="#0f172a" letter-spacing="6">jorvel</text>
</svg>
